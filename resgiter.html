<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        form{
            background:white;
            padding:30px;
            border-radius:8px;
            display:flex;
            flex-direction:column;
            gap:10px;
            width:250px;
        }

        form p{
            text-align:center;
            font-size:20px;
            margin-bottom:10px;
        }

        input{
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        #submit{
            background:#17a2b8;
            color:white;
            border:none;
            cursor:pointer;
        }

        #submit:hover{
            background:#138496;
        }
</style>
</head>
<body>
    <form>
        <p>Đăng kí</p>
        <input type="text" placeholder="Tên" id="name">
        <input type="text" placeholder="Mật khẩu" id="pass">
        <input type="submit" value="Đăng kí" id="submit">
        <a href="login.html">Đã có tài khoản?</a>
    </form>

    <script src="./JS/resgiter.js"></script>
</body>
</html>
