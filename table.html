<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng xếp hạng</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f5f5f5;
        }
        nav{
            display:flex;
            align-items:center;
            gap:15px;
            padding:15px 30px;
            background:#37003c;
        }
        nav a.logo{
            margin-right:auto;
        }

        nav a.logo img{
            width:70px;
        }

        nav img{
            width:70px;
            margin-right:auto;
        }
        .main{
            padding:20px;
        }

        /* TEAM CARD */
        .main div{
            display:flex;
            align-items:center;
            gap:15px;
            background:white;
            padding:10px 15px;
            margin-bottom:10px;
            border-radius:8px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        /* LOGO */
        .main img{
            width:40px;
            height:40px;
        }

        /* TEAM NAME LINK */
        .main a{
            text-decoration:none;
            color:#333;
            font-size:18px;
            font-weight:bold;
            cursor: pointer;
        }

        .main a:hover{
            color:#37003c;
        }

        .in4 {
            display: none;
            position: absolute;
        }
        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            bottom:0;
            width:100%;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="indexlogined.html" class="logo"><img src="logo.png"></a>
            <a href="#"><button type="button" class="btn btn-info">Câu lạc bộ</button></a>
            <a href="stats.html"><button type="button" class="btn btn-info">Tin tức</button></a>
            <a href="index.html"><button type="button" class="btn btn-primary">Đăng xuất</button></a>
        </nav>
    </header>
    <div class="main">
        <article class="in4">

        </article>
    </div>
    <footer>
        <p>Email: nhieuhoangkhang2@gmail.com</p>
    </footer>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="./JS/table.js"></script>
