<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Số liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f5f5f5;
        }
        nav{
            display:flex;
            align-items:center;
            gap:15px;
            padding:15px 30px;
            background:#37003c;
        }
        nav a.logo{
            margin-right:auto;
        }

        nav a.logo img{
            width:70px;
        }

        nav img{
            width:70px;
            margin-right:auto;
        }
        .main{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap:20px;
            padding:20px;
        }

        /* CARD */
        .main div{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            display:flex;
            flex-direction:column;
        }

        /* TITLE */
        .main h2{
            font-size:18px;
            margin-bottom:10px;
            color:#37003c;
        }

        /* DESCRIPTION */
        .main p{
            font-size:14px;
            color:#555;
            margin-bottom:10px;
        }

        /* IMAGE */
        .main img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
            margin-bottom:10px;
        }

        /* LINK */
        .main a{
            margin-top:auto;
            text-decoration:none;
            font-weight:bold;
            color:#007bff;
        }

        .main a:hover{
            text-decoration:underline;
        }
        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            bottom:0;
            width:100%;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="indexlogined.html" class="logo"><img src="logo.png"></a>
            <a href="table.html"><button type="button" class="btn btn-info">Câu lạc bộ</button></a>
            <a href="#"><button type="button" class="btn btn-info" style="background-color: white;">Tin tức</button></a>
            <a href="index.html"><button type="button" class="btn btn-primary">Đăng xuất</button></a>
        </nav>
    </header>
    <div class="main">

    </div>
    <footer>
        <p>Email: nhieuhoangkhang2@gmail.com</p>
    </footer>
    <script src="./JS/news.js"></script>
</body>
</html>
